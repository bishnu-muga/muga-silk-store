<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Assam Muga Silk</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

.header{
background:black;
color:#d4af37;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
}

.menu{
font-size:26px;
cursor:pointer;
}

.brand{
display:flex;
align-items:center;
font-size:22px;
font-weight:bold;
}

.brand img{
height:45px;
margin-right:8px;
}

.cart{
font-size:22px;
}

/* SEARCH */

.search{
padding:10px;
background:#eee;
}

.search input{
width:100%;
padding:10px;
font-size:16px;
border:none;
border-radius:5px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
padding:10px;
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin:10px 0;
}

.view{
background:#c79a1b;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

/* MENU */

.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:black;
color:white;
padding:20px;
transition:0.3s;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.sidebar .close{
font-size:22px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- SIDEBAR MENU -->

<div class="sidebar" id="menu">

<div class="close" onclick="closeMenu()">✕ Close</div>

<a href="index.html">Home</a>

<a href="muga.html">Muga Saree</a>

<a href="gamusa.html">Muga Gamusa</a>

<a href="eri.html">Eri Shawl</a>

</div>

<!-- HEADER -->

<div class="header">

<div class="menu" onclick="openMenu()">☰</div>

<div class="brand">

<img src="logo.png">

Assam Muga Silk

</div>

<div class="cart">🛒</div>

</div>

<!-- SEARCH -->

<div class="search">

<input type="text" placeholder="Search silk products">

</div>

<!-- PRODUCTS -->

<div class="products">

<div class="card">

<img src="eri1.jpg">

<h3>Muga Silk Saree</h3>

<a href="muga.html">
<button class="view">View</button>
</a>

</div>

<div class="card">

<img src="eri2.jpg">

<h3>Muga Silk Gamusa</h3>

<a href="gamusa.html">
<button class="view">View</button>
</a>

</div>

<div class="card">

<img src="eri3.jpg">

<h3>Eri Silk Shawl</h3>

<a href="eri.html">
<button class="view">View</button>
</a>

</div>

</div>

<script>

function openMenu(){
document.getElementById("menu").style.left="0";
}

function closeMenu(){
document.getElementById("menu").style.left="-250px";
}

</script>

</body>
</html>
