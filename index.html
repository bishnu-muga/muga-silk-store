<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assam Muga Silk</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* header */

.header{
background:black;
color:#d4af37;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
}

.brand{
display:flex;
align-items:center;
font-size:22px;
font-weight:bold;
}

.brand img{
height:45px;
margin-right:8px;
}

.menu{
font-size:26px;
cursor:pointer;
}

.cart{
font-size:22px;
}

/* search */

.search{
padding:12px;
background:#eee;
}

.search input{
width:100%;
padding:10px;
font-size:16px;
border-radius:6px;
border:none;
}

/* product grid */

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
padding:10px;
}

.card img{
width:100%;
border-radius:8px;
}

.card h3{
font-size:18px;
margin:10px 0;
}

.view{
background:#c79a1b;
border:none;
color:white;
padding:8px 16px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">

<div class="menu">☰</div>

<div class="brand">
<img src="logo.png">
Assam Muga Silk
</div>

<div class="cart">🛒</div>

</div>

<div class="search">
<input type="text" placeholder="Search silk products">
</div>

<div class="products">

<div class="card">
<img src="eri1.jpg">
<h3>Muga Silk Saree</h3>
<a href="muga.html"><button class="view">View</button></a>
</div>

<div class="card">
<img src="eri2.jpg">
<h3>Muga Silk Gamusa</h3>
<a href="gamusa.html"><button class="view">View</button></a>
</div>

<div class="card">
<img src="eri3.jpg">
<h3>Eri Silk Shawl</h3>
<a href="eri.html"><button class="view">View</button></a>
</div>

</div>

</body>
</html>
